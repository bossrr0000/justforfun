<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contexto Pro Solver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Contexto Pro Solver</h1>
        
        <div id="hints-container">
            <div class="hint-row">
                <input type="text" class="hint-word" spellcheck="false">
                <input type="number" class="hint-pos">
                <button class="remove-btn" onclick="removeHint(this)">×</button>
            </div>
        </div>

        <div class="button-group">
            <button id="add-hint">+</button>
            <button id="search-btn">Search Game</button>
        </div>

        <div id="progress-wrapper" style="display: none;">
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div id="status-text">Scanning...</div>
        </div>

        <div id="result-area"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
